<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BikeSafe TO</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-geosearch@3.1.0/dist/geosearch.css"/>
<style>
  body, html { margin:0; padding:0; height:100%; font-family: Arial, sans-serif; }
  #map { height:100%; width:100%; }
  .popup-buttons, .popup-edit { display:flex; flex-direction:column; gap:10px; text-align:center; }
  .hazard-btn, .popup-edit button { 
    padding:10px 20px; font-size:22px; font-weight:bold; cursor:pointer; border:none; border-radius:5px; color:white; 
  }
  .Construction { background-color: orange; }
  .PoorRoadDebris { background-color: red; }
  .CarParked { background-color: yellow; color:black; }
  .legend { background:white; padding:16px; line-height:1.8; border-radius:7px; box-shadow:0 0 5px rgba(0,0,0,0.3); font-size:16px; min-width:180px; }
  .legend span { display:inline-block; width:12px; height:12px; margin-right:5px; vertical-align:middle; }
  .legend h4 { margin:0 0 7px 0; font-size:16px; }
  #notification { 
  position: fixed; 
  top: 500px; 
  left: 50%; 
  transform: translateX(-50%); 
  padding: 20px 40px;   /* doubled from 10px 20px */
  border-radius: 10px;   /* optional, make corners proportionally bigger */
  display: none; 
  font-weight: bold; 
  font-size: 24px;       /* add this line, larger text */
  z-index: 1000; 
  box-shadow: 0 0 5px rgba(0,0,0,0.3); 
}
  .popup-edit button:nth-child(1) { background-color: #007bff; }
  .popup-edit button:nth-child(2) { background-color: #dc3545; }
  /* Style for the GeoSearch input */
.leaflet-control-geosearch input {
  width: 300px !important;      /* width of the input */
  height: 50px !important;      /* height of the input */
  font-size: 16px !important;   /* size of the text */
  padding: 5px 10px !important; /* top-bottom, left-right spacing */
  color: black !important;
}
/* ------------------ */
/* Zoom + / - buttons */

/* Resize buttons */
.leaflet-control-zoom a {
  width: 40px !important;       /* width of buttons */
  height: 40px !important;      /* height of buttons */
  font-size: 24px !important;   /* size of + / - */
  line-height: 40px !important; /* vertical align text */
}

/* Move zoom buttons */
.leaflet-control-zoom {
  top: 80px !important;    /* distance from top */
  left: 10px !important;   /* distance from left */
}
/* ------------------ */
/* Recenter button */

.recenter-btn {
  top: 200px !important;    /* adjust vertical position */
  left: 10px !important;    /* adjust horizontal position */
  z-index: 1000;
  position: absolute;       /* make it float */
}
.recenter-btn button {
  transform: scale(1.4);  /* doubles the button size */
  transform-origin: center center; /* scale from center */
}
.recenter-btn button {
  padding: 10px 16px;       /* doubled from 10px 16px */
  font-size: 32px;          /* doubled from 16px */
  border-radius: 12px;      /* optional, double from 6px for proportion */
}
</style>
</head>
<body>

<div id="notification"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-geosearch@3.1.0/dist/bundle.min.js"></script>

<script>
const SHEETDB_URL = 'https://sheetdb.io/api/v1/k1z7j20dp9lms';
const HAZARD_LIFETIME_DAYS = 7;
let nextId = 1;
const markers = {};
let tempMarker = null;

// ------------------
// Initialize map
const map = L.map('map').setView([43.65107, -79.347015], 12);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
  subdomains: 'abcd', maxZoom: 19
}).addTo(map);
// ------------------
// ------------------
// USER GPS LOCATION
let userMarker = null;
let accuracyCircle = null;
let followUser = true;       // whether to follow the user
const followThreshold = 40;  // 40 pixels before stopping follow

function onLocationFound(e) {
  const latlng = e.latlng;
  const radius = e.accuracy;

  // Remove old marker and circle
  if (userMarker) {
    userMarker.setLatLng(latlng);
    accuracyCircle.setLatLng(latlng).setRadius(radius);
  } else {
    userMarker = L.circleMarker(latlng, {
      radius: 8,
      color: "#007bff",
      fillColor: "#007bff",
      fillOpacity: 1
    }).addTo(map);

    accuracyCircle = L.circle(latlng, {
      radius: radius,
      color: "#007bff",
      fillColor: "#007bff",
      fillOpacity: 0.15
    }).addTo(map);

    // Center first time
    map.setView(latlng, 15);
  }

  // Only fly if following
  if (followUser) {
    map.flyTo(latlng, map.getZoom(), { duration: 0.8 });
  }
}

function onLocationError(e) {
  console.log("Location access denied or unavailable.");
}

// Stop following if user drags more than threshold
map.on('drag', () => {
  if (!userMarker) return;
  const mapCenterPoint = map.latLngToContainerPoint(map.getCenter());
  const userPoint = map.latLngToContainerPoint(userMarker.getLatLng());
  if (mapCenterPoint.distanceTo(userPoint) > followThreshold) {
    followUser = false;
  }
});

// Optional: button to recenter and resume following
// Recenter button
const recenterBtn = L.control({ position: 'topleft' });
recenterBtn.onAdd = function () {
  const div = L.DomUtil.create('div', 'recenter-btn');
  div.innerHTML = `<button style="padding:8px 12px; font-size:14px; border:none; border-radius:5px; background:#007bff; color:white; cursor:pointer;">Recenter</button>`;
  
  div.firstChild.onclick = () => {
    if (userMarker) {
      followUser = true;
      // Fly to user's current location and zoom to 15
      map.flyTo(userMarker.getLatLng(), 17, { duration: 0.8 });
    }
  };
  
  return div;
};
recenterBtn.addTo(map);

// Start watching position continuously
map.on('locationfound', onLocationFound);
map.on('locationerror', onLocationError);
map.locate({ watch: true, enableHighAccuracy: true });

// ------------------
// Utility functions
function getBikeLaneColor(type){
  if(!type) return "gray";
  type = type.toLowerCase();
  if(type.includes("signed route") || type.includes("sharrow")) return "#007bff";
  if(type.includes("bike lane") || type.includes("contraflow")) return "#28a745";
  if(type.includes("multi-use trail") || type.includes("cycle track") || type.includes("park road")) return "#6f42c1";
  return "gray";
}

function getColor(type){
  switch(type){
    case "Construction": return "orange";
    case "Poor Road Condition/Debris": return "red";
    case "Car Parked": return "yellow";
    default: return "blue";
  }
}

function timeAgo(isoDate){
  const now = new Date(), report = new Date(isoDate);
  const diff = Math.floor((now - report)/1000);
  if(diff < 60) return `${diff} seconds ago`;
  if(diff < 3600) return `${Math.floor(diff/60)} minutes ago`;
  if(diff < 86400) return `${Math.floor(diff/3600)} hours ago`;
  return `${Math.floor(diff/86400)} days ago`;
}

function showNotification(type){
  const notif = document.getElementById('notification');
  const emoji = type==="Construction"? "🚧" : type==="Poor Road Condition/Debris"? "🛑" : "⚠️";
  notif.textContent = `${emoji} ${type} reported!`;
  notif.style.background = getColor(type);
  notif.style.color = (type==="Car Parked") ? "black" : "white";
  notif.style.display = 'block';
  setTimeout(()=>{ notif.style.display='none'; }, 5000);
}

// ------------------
// Marker functions
function generatePopupContent(id,type,timestamp){
  return `<b>Hazard:</b> ${type}<br><b>Reported:</b> ${timeAgo(timestamp)}<br>
    <div class="popup-edit">
      <button class="edit-btn" data-id="${id}">Edit</button>
      <button class="delete-btn" data-id="${id}">Delete</button>
    </div>`;
}

function createMarker(id, latlng, type, timestamp){
  const marker = L.circleMarker(latlng, { color:getColor(type), radius:16, fillOpacity:0.7 }).addTo(map);
  marker.bindPopup(generatePopupContent(id,type,timestamp));

  marker.on('popupopen', function(){
    const popupEl = marker.getPopup().getElement();
    if(!popupEl) return;

    // Edit button
    popupEl.querySelectorAll('.edit-btn').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.stopPropagation();
        const hazard = markers[id];
        if(!hazard) return;
        const editPopup = `
          <div class="popup-buttons">
            <b>Edit Hazard</b>
            <button class="hazard-btn" data-type="Construction" style="background: orange;">Construction</button>
            <button class="hazard-btn" data-type="Poor Road Condition/Debris" style="background: red;">Poor Road Condition/Debris</button>
            <button class="hazard-btn" data-type="Car Parked" style="background: yellow; color:black;">Car Parked</button>
          </div>`;
        marker.setPopupContent(editPopup).openPopup();

        const editEl = marker.getPopup().getElement();
        editEl.querySelectorAll('.hazard-btn').forEach(hBtn=>{
          hBtn.addEventListener('click', evt=>{
            evt.stopPropagation();
            const newType = hBtn.getAttribute('data-type');
            hazard.type = newType;
            marker.setStyle({ color:getColor(newType) });
            marker.setPopupContent(generatePopupContent(id,newType,hazard.timestamp)).openPopup();

            // Update SheetDB
            fetch(`${SHEETDB_URL}/id/${id}`, {
              method:'PATCH',
              headers:{'Content-Type':'application/json'},
              body: JSON.stringify({ data:[{ Type: newType }] })
            });
          });
        });
      });
    });

    // Delete button
    popupEl.querySelectorAll('.delete-btn').forEach(btn=>{
      btn.addEventListener('click', e=>{
        e.stopPropagation();
        map.removeLayer(marker);
        delete markers[id];
        fetch(`${SHEETDB_URL}/id/${id}`, { method:'DELETE' });
      });
    });
  });

  markers[id] = { marker, type, timestamp };
}

// Function for invisible click layer to snap clicks to nearest point on the bike lane
function snapToLine(latlng, polylineLayer) {
  const mapPoint = map.latLngToLayerPoint(latlng);
  const latlngs = polylineLayer.getLatLngs();

  let closestPoint = null;
  let minDist = Infinity;

  function projectPointOnSegment(p, p1, p2) {
    const dx = p2.x - p1.x;
    const dy = p2.y - p1.y;
    const lengthSq = dx * dx + dy * dy;
    if (lengthSq === 0) return p1;

    let t = ((p.x - p1.x) * dx + (p.y - p1.y) * dy) / lengthSq;
    t = Math.max(0, Math.min(1, t));

    return L.point(
      p1.x + t * dx,
      p1.y + t * dy
    );
  }

  latlngs.forEach(segment => {
    for (let i = 0; i < segment.length - 1; i++) {

      const p1 = map.latLngToLayerPoint(segment[i]);
      const p2 = map.latLngToLayerPoint(segment[i + 1]);

      const projected = projectPointOnSegment(mapPoint, p1, p2);
      const dist = mapPoint.distanceTo(projected);

      if (dist < minDist) {
        minDist = dist;
        closestPoint = projected;
      }
    }
  });

  return map.layerPointToLatLng(closestPoint);
}
// ------------------
// ------------------
// ------------------
// Load bike lanes and handle click reporting
fetch('toronto_bike_lanes.geojson')
  .then(res => res.json())
  .then(geojson => {

    // 1️⃣ Visible thin lanes (just visual)
    L.geoJSON(geojson, {
      style: f => ({
        color: getBikeLaneColor(
          f.properties.INFRA_HIGHORDER || f.properties.INFRA_LOWORDER
        ),
        weight: 6,
        opacity: 0.8
      })
    }).addTo(map);

    // 2️⃣ Invisible thick click layer
    L.geoJSON(geojson, {
      style: () => ({
        color: '#000',
        weight: 20,     // 👈 big click zone
        opacity: 0,
        fillOpacity: 0,
        interactive: true
      }),

      onEachFeature: (f, layer) => {

        const street = f.properties.STREET_NAME || 'Bike Lane';
        const laneType = f.properties.INFRA_HIGHORDER || f.properties.INFRA_LOWORDER;

        layer.on('click', function(e){

          const clickedLatLng = snapToLine(e.latlng, layer);

          // Close any existing popup
          map.closePopup();

          // Move or create temp marker
          if(tempMarker){
            tempMarker.setLatLng(clickedLatLng);
          } else {
            tempMarker = L.marker(clickedLatLng).addTo(map);
          }

          // First popup
          const firstPopupContent = `
            <b>Street:</b> ${street}<br>
            <b>Lane type:</b> ${laneType}<br><br>
            <button class="report-btn" style="padding:10px 20px; background:#007bff; color:white; border:none; border-radius:5px; cursor:pointer;">
              Report Hazard
            </button>
          `;

          const firstPopup = L.popup({ closeOnClick:false, autoClose:false })
            .setLatLng(clickedLatLng)
            .setContent(firstPopupContent)
            .openOn(map);

          setTimeout(() => {

            const popupEl = firstPopup.getElement();
            if(!popupEl) return;

            const reportBtn = popupEl.querySelector('.report-btn');
            if(!reportBtn) return;

            reportBtn.onclick = function(evt){
              evt.stopPropagation();

              map.closePopup(firstPopup);

              const hazardPopupContent = `
                <div class="popup-buttons">
                  <button class="hazard-btn" data-type="Construction" style="background: orange;">Construction</button>
                  <button class="hazard-btn" data-type="Poor Road Condition/Debris" style="background: red;">Poor Road Condition/Debris</button>
                  <button class="hazard-btn" data-type="Car Parked" style="background: yellow; color:black;">Car Parked</button>
                </div>
              `;

              const hazardPopup = L.popup({ closeOnClick:false, autoClose:false })
                .setLatLng(clickedLatLng)
                .setContent(hazardPopupContent)
                .openOn(map);

              const hazardPopupEl = hazardPopup.getElement();
              if(!hazardPopupEl) return;

              hazardPopupEl.querySelectorAll('.hazard-btn').forEach(btn => {

                btn.onclick = function(evt){
                  evt.stopPropagation();

                  const hazardType = btn.getAttribute('data-type');
                  const id = nextId++;
                  const timestamp = new Date().toISOString();

                  createMarker(id, clickedLatLng, hazardType, timestamp);
                  showNotification(hazardType);

                  fetch(SHEETDB_URL, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({
                      data:[{
                        id,
                        Lat: clickedLatLng.lat,
                        Lng: clickedLatLng.lng,
                        Type: hazardType,
                        Street: street,
                        LaneType: laneType,
                        Timestamp: timestamp
                      }]
                    })
                  });

                  if(tempMarker){
                    map.removeLayer(tempMarker);
                    tempMarker = null;
                  }

                  map.closePopup(hazardPopup);
                };

              });
            };

          }, 20);
        });
      }
    }).addTo(map);

  });
// Load existing hazards
fetch(SHEETDB_URL).then(res=>res.json()).then(data=>{
  if(data.length>0){
    nextId = Math.max(...data.map(i=>parseInt(i.id)))+1;
  }
  data.forEach(item=>{
    if(item.Lat && item.Lng && item.Type && item.Timestamp && item.id){
      const ageDays = (new Date() - new Date(item.Timestamp))/(1000*60*60*24);
      if(ageDays <= HAZARD_LIFETIME_DAYS){
        createMarker(item.id, L.latLng(parseFloat(item.Lat), parseFloat(item.Lng)), item.Type, item.Timestamp);
      }
    }
  });
});


// ------------------
// Legend
const legend = L.control({position:'topright'});
legend.onAdd = function(map){
  const div = L.DomUtil.create('div','legend');
  div.innerHTML = "<h4>Legend</h4>";
  div.innerHTML += "<b>Hazards</b><br>";
  div.innerHTML += '<span style="background: orange"></span> Construction<br>';
  div.innerHTML += '<span style="background: red"></span> Poor Road Condition/Debris<br>';
  div.innerHTML += '<span style="background: yellow"></span> Car Parked<br><br>';
  div.innerHTML += "<b>Bike Lanes</b><br>";
  div.innerHTML += '<span style="background:#007bff"></span> Signed Route / Sharrows<br>';
  div.innerHTML += '<span style="background:#28a745"></span> Bike Lane / Contraflow / Buffered<br>';
  div.innerHTML += '<span style="background:#6f42c1"></span> Multi-Use Trail / Cycle Track<br>';
  return div;
};
legend.addTo(map);

// ------------------
// Search control
const gtaViewbox = [-79.6393, 43.5810, -79.1169, 43.8555];
const provider = new window.GeoSearch.OpenStreetMapProvider({
  params:{ countrycodes:'ca', addressdetails:1, limit:5, viewbox:gtaViewbox.join(','), bounded:1 }
});
const searchControl = new window.GeoSearch.GeoSearchControl({
  provider: provider, style:'bar', showMarker:true, showPopup:true, autoComplete:true, autoClose:true, retainZoomLevel:false, searchLabel:'Search GTA address...'
});
map.addControl(searchControl);
</script>
</body>
</html>

// comments
